{% extends "base.html" %}
{% block content %}

<body >

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg rounded-4 p-4" style="width: 500px;">

        <h2 class="text-center mb-4">Forgot Password</h2>
        <form method="POST">

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Enter your email </label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>
            </div>
            <a href="/otp_verify" class="btn btn-primary w-100 mt-2">Send OTP</a>
        </form>
    </div>
</div>
</body>
{% endblock %}
